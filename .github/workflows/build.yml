name: Docker Compose Build

on:
  pull_request:
    paths:
      - 'docker/**'
      - 'conf/**'
      - 'compose.yml'
      - 'lila-docker'
      - 'scripts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: ./lila-docker build
      - run: docker image ls
